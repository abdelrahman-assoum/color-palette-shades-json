<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; margin: 12px; }
      textarea { width: 100%; height: 160px; box-sizing: border-box; }
      label { display:block; margin: 8px 0 4px; font-weight: 600; }
      input[type=text] { width: 100%; box-sizing: border-box; padding: 6px; }
      .row { display:flex; gap:8px; margin-top: 10px; }
      button { padding: 8px 10px; font-weight:600; cursor:pointer; }
      small { color:#666 }
    </style>
  </head>
  <body>
    <label>Palette JSON <small>(see example below)</small></label>
    <textarea id="json"></textarea>

    <label>Title on the left (e.g., “Primary Color”)</label>
    <input id="title" type="text" value="Primary Color"/>

    <div class="row">
      <button id="render">Create on Canvas</button>
    </div>

    <details style="margin-top:10px">
      <summary>JSON example (single palette)</summary>
      <pre>{
  "name": "Primary",
  "shades": {
    "50":  "#EDF3FF",
    "100": "#DFE9FF",
    "200": "#C7D8FB",
    "300": "#A7C1F4",
    "400": "#6D8FE3",
    "500": "#3D66CF",
    "600": "#274EB3",
    "700": "#193E8F",
    "800": "#132E6B",
    "900": "#0C1E47"
  }
}</pre>
    </details>

    <script>
      document.getElementById('render').onclick = () => {
        const raw = document.getElementById('json').value.trim();
        const title = document.getElementById('title').value.trim() || 'Palette';
        try {
          const parsed = JSON.parse(raw);
          parent.postMessage({ pluginMessage: { type: 'render', payload: parsed, title } }, '*');
        } catch (e) {
          alert('Invalid JSON: ' + e.message);
        }
      };
    </script>
  </body>
</html>
